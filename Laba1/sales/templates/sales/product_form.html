<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавить товар</title>
</head>
<body>
  <h1>Добавить товар</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
  </form>

  <p>
    <a href="{% url 'products_list' %}">
      <button type="button">Назад к базе товаров</button>
    </a>
  </p>
</body>
</html>
