{% extends "employees/base.html" %}
{% block content %}
<h2>Список сотрудников (гость)</h2>
<table>
  <tr>
    <th>ФИО</th><th>Должность</th><th>Рабочий телефон</th>
  </tr>
  {% for e in employees %}
  <tr>
    <td>{{ e.last_name }} {{ e.first_name }} {{ e.patronymic }}</td>
    <td>{{ e.position }}</td>
    <td>{{ e.work_phone }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
